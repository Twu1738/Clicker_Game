<body>
    <div class="parent-container">

    <div class="inner-container-horizontal">
        <header>Clicker Game</header>
    </div>
    
    <div class="bottom-row">
    <div class="inner-container-vertical">
        <button class="test-button" id="test-button" onclick="addClicks()">
            Click Me!
        </button>

        <p>Click Counter: <span id="counter">0</span></p> 

    </div> <!-- click me button ic-->

    <div class="inner-container-vertical">
        <button class="test-button" onclick="upgrades.upgradeChecker(5, 'clickPower', 'add', 1)"> 
            Add +1 
        </button>

        <button class="test-button" onclick="upgrades.upgradeChecker(25, 'clickPower', 'multiply', 2)"> 
            Multiply by 2 
        </button>

    </div> <!-- upgrade ic-->
    
    </div> <!-- bottom row-->

    </div> <!-- parent container-->

    <script src="javascript.js"></script>
